name: Kross Deploy

# Builds the app and uploads the prebuilt dist/ straight to Netlify via
# KrossBuild's ci-deploy-ingest function. Netlify never clones/builds the repo,
# which permanently avoids the EISDIR build failure class.

on:
  push:
    branches: [ main, master ]
  repository_dispatch:
    types: [ kross-preview-build ]
  workflow_dispatch:
    inputs:
      deployment_id:
        description: "Existing KrossBuild deployment id to reuse (optional)"
        required: false
        default: ""
      mode:
        description: "Deploy mode: production (publish) or preview (draft)"
        required: false
        default: "production"
      checkout_ref:
        description: "Git ref to checkout/build; defaults to the dispatch ref"
        required: false
        default: ""

concurrency:
  # Preview dispatches are isolated per deployment id so they never cancel an
  # in-flight production publish (and vice-versa). Push deploys group per ref.
  group: kross-deploy-${{ github.ref }}-${{ github.event.inputs.deployment_id || github.event.client_payload.deployment_id || 'push' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Upload Artifact
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.event.client_payload.checkout_ref || github.ref }}

      - name: 🧭 Resolve Kross deploy context
        run: |
          set -eo pipefail
          DEPLOYMENT_ID="${{ github.event.inputs.deployment_id || github.event.client_payload.deployment_id || '' }}"
          MODE="${{ github.event.inputs.mode || github.event.client_payload.mode || '' }}"
          if [ -z "$MODE" ]; then
            if [ "$GITHUB_REF_NAME" = "kross-preview" ]; then MODE="preview"; else MODE="production"; fi
          fi
          if [ -z "$DEPLOYMENT_ID" ] && [ -f ".krossbuild/preview.json" ]; then
            DEPLOYMENT_ID="$(node -e "try{const j=require('./.krossbuild/preview.json');process.stdout.write(j.deploymentId||'')}catch(e){}")"
            FILE_MODE="$(node -e "try{const j=require('./.krossbuild/preview.json');process.stdout.write(j.mode||'')}catch(e){}")"
            if [ -n "$FILE_MODE" ]; then MODE="$FILE_MODE"; fi
          fi
          echo "KROSS_DEPLOYMENT_ID=$DEPLOYMENT_ID" >> "$GITHUB_ENV"
          echo "KROSS_MODE=$MODE" >> "$GITHUB_ENV"
          echo "Resolved Kross context: mode=$MODE deploymentId=${DEPLOYMENT_ID:-<new>}"

      # Preflight: fail fast (with a clear, classifiable error) when the repo
      # is empty or only partially pushed. A 0-second "Build" with
      # "Script not found" almost always means the full file tree never reached
      # GitHub — catch that here instead of cascading through install/build/zip.
      - name: 🧪 Preflight — verify repo file tree
        run: |
          set -eo pipefail
          {
            echo "Verifying repository contents before build…"
            MISSING=""
            [ -f package.json ] || MISSING="$MISSING package.json"
            { [ -f vite.config.ts ] || [ -f vite.config.js ]; } || MISSING="$MISSING vite.config"
            [ -d src ] || MISSING="$MISSING src/"
            [ -f index.html ] || MISSING="$MISSING index.html"
            if [ -n "$MISSING" ]; then
              echo "::error::Incomplete repo — missing:$MISSING. The full project file tree was not pushed to GitHub. Reconnect GitHub / re-push code, then retry the preview build."
              echo "Repository root listing:"; ls -la
              exit 1
            fi
            # Tolerant build-script check. package.json may carry a leading
            # // comment, a BOM, or a trailing comma — all of which strict JSON
            # parsers (require/JSON.parse) reject, causing a FALSE "no build
            # script" failure on otherwise-valid projects. Grep for the script
            # key instead; the real "vite build" step below is the source of
            # truth for anything subtler.
            if ! grep -Eq '"(build|dev)"[[:space:]]*:' package.json; then
              echo "::error::package.json has no 'build' (or 'dev') script — this does not look like a full Vite project. The complete project was likely not pushed to GitHub. Reconnect GitHub / re-push code, then retry."
              echo "package.json contents:"; cat package.json
              exit 1
            fi
            FILE_COUNT="$(git ls-files | wc -l | tr -d ' ')"
            echo "Preflight OK — $FILE_COUNT tracked files, package.json + build script present."
          } 2>&1 | tee -a build.log

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Cache Bun's global install cache keyed on the lockfile so repeat builds
      # (especially rapid preview rebuilds) skip re-downloading dependencies.
      - name: ♻️ Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      # Some user package.json files contain JS-style comments or trailing
      # commas (invalid JSON). esbuild reads package.json when loading
      # vite.config.ts and hard-fails with "JSON does not support comments",
      # killing the build before bundling. Normalize it here (string-aware,
      # only rewrites when the file is actually invalid) so no malformed
      # package.json can break a user's build.
      - name: 🧹 Normalize package.json
        run: |
          set -eo pipefail
          cat > /tmp/normalize-pkg.cjs <<'NORMEOF'
          const fs = require('fs');
          const p = 'package.json';
          let s;
          try { s = fs.readFileSync(p, 'utf8'); } catch (e) { process.exit(0); }
          try { JSON.parse(s); process.exit(0); } catch (e) {}
          let out = '', inStr = false, q = '', esc = false;
          for (let i = 0; i < s.length; i++) {
            const c = s[i], n = s[i + 1];
            if (inStr) {
              out += c;
              if (esc) esc = false;
              else if (c === '\\') esc = true;
              else if (c === q) inStr = false;
              continue;
            }
            if (c === '"' || c === "'") { inStr = true; q = c; out += c; continue; }
            if (c === '/' && n === '/') { while (i < s.length && s[i] !== '\n') i++; out += '\n'; continue; }
            if (c === '/' && n === '*') { i += 2; while (i < s.length && !(s[i] === '*' && s[i + 1] === '/')) i++; i++; continue; }
            out += c;
          }
          out = out.replace(/,(\s*[}\]])/g, '$1');
          try {
            const o = JSON.parse(out);
            fs.writeFileSync(p, JSON.stringify(o, null, 2) + '\n');
            console.log('Normalized package.json (stripped comments/trailing commas).');
          } catch (e) {
            console.error('::warning::Could not auto-normalize package.json: ' + e.message);
          }
          NORMEOF
          node /tmp/normalize-pkg.cjs 2>&1 | tee -a build.log

      # Every build step tees its output into build.log so the failure
      # reporter below can ship the real error text to KrossBuild for
      # deterministic signature classification + auto-fix. GitHub's default
      # shell runs with `pipefail`, so tee never masks a non-zero exit.
      - name: 📥 Install dependencies
        run: |
          set -eo pipefail
          bun install 2>&1 | tee -a build.log

      # User code frequently imports packages that were never added to
      # package.json (e.g. "lucide-react"), so Rollup fails to resolve the
      # import and the build dies. Scan the source for bare imports that are
      # not installed and `bun add` them before building. Best-effort: never
      # fails the build, just heals what it can.
      - name: 🔗 Resolve missing imports
        run: |
          set -eo pipefail
          cat > /tmp/resolve-imports.cjs <<'RESEOF'
          const fs = require('fs');
          const path = require('path');
          const cp = require('child_process');
          let pkg = {};
          try { pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); } catch (e) { process.exit(0); }
          const builtins = new Set(require('module').builtinModules);
          const exts = new Set(['.ts', '.tsx', '.js', '.jsx', '.mjs', '.cjs']);
          const packagePart = '(?![._])[a-z0-9][a-z0-9._-]*';
          const packageNameRe = new RegExp('^(?:@' + packagePart + '\/' + packagePart + '|' + packagePart + ')$');
          const isValidPackageName = (name) => (
            typeof name === 'string' && name.length > 0 && name.length <= 214 &&
            !name.includes('..') && packageNameRe.test(name)
          );
          const packageNameFromSpecifier = (spec) => {
            if (typeof spec !== 'string') return null;
            const clean = spec.trim();
            if (!clean || clean.length > 300) return null;
            if (clean.startsWith('.') || clean.startsWith('/') || clean.startsWith('@/') || clean.startsWith('node:')) return null;
            const forbidden = [' ', '\t', '\n', '\r', '"', "'", String.fromCharCode(96), '$', '(', ')', '{', '}', '<', '>', '|', '&', ';', '\\'];
            if (forbidden.some((ch) => clean.includes(ch))) return null;
            const parts = clean.split('/');
            const name = clean.startsWith('@') ? parts.slice(0, 2).join('/') : parts[0];
            return isValidPackageName(name) ? name : null;
          };
          const stripComments = (src) => {
            let out = '', inStr = false, q = '', esc = false;
            for (let i = 0; i < src.length; i++) {
              const c = src[i], n = src[i + 1];
              if (inStr) {
                out += c;
                if (esc) esc = false;
                else if (c === '\\') esc = true;
                else if (c === q) inStr = false;
                continue;
              }
              if (c === '"' || c === "'" || c === String.fromCharCode(96)) { inStr = true; q = c; out += c; continue; }
              if (c === '/' && n === '/') { while (i < src.length && src[i] !== '\n') i++; out += '\n'; continue; }
              if (c === '/' && n === '*') { i += 2; while (i < src.length && !(src[i] === '*' && src[i + 1] === '/')) { out += src[i] === '\n' ? '\n' : ' '; i++; } i++; continue; }
              out += c;
            }
            return out;
          };
          const collectSpecifiers = (source) => {
            const src = stripComments(source);
            const specs = new Set();
            const isIdent = (ch) => !!ch && /[A-Za-z0-9_$]/.test(ch);
            const startsWord = (i, word) => src.startsWith(word, i) && !isIdent(src[i - 1]) && !isIdent(src[i + word.length]);
            const skipString = (start) => {
              const q = src[start];
              let esc = false;
              for (let i = start + 1; i < src.length; i++) {
                const c = src[i];
                if (esc) { esc = false; continue; }
                if (c === '\\') { esc = true; continue; }
                if (c === q) return i;
              }
              return src.length - 1;
            };
            const readCallString = (start) => {
              let i = start;
              while (/\s/.test(src[i] || '')) i++;
              if (src[i] !== '(') return null;
              i++;
              while (/\s/.test(src[i] || '')) i++;
              if (src[i] !== '"' && src[i] !== "'") return null;
              const q = src[i++];
              let value = '', esc = false;
              for (; i < src.length; i++) {
                const c = src[i];
                if (esc) { value += c; esc = false; continue; }
                if (c === '\\') { esc = true; continue; }
                if (c === q) return { value, end: i };
                value += c;
              }
              return null;
            };
            for (let i = 0; i < src.length; i++) {
              const c = src[i];
              if (c === '"' || c === "'" || c === String.fromCharCode(96)) { i = skipString(i); continue; }
              if (startsWord(i, 'import')) {
                const stmt = src.slice(i, i + 1600);
                const m = stmt.match(/^import\s+(?:type\s+)?(?:[^;]*?\s+from\s*)?['"]([^'"\n]+)['"]/s);
                if (m) specs.add(m[1]);
                const call = readCallString(i + 'import'.length);
                if (call) { specs.add(call.value); i = call.end; }
              } else if (startsWord(i, 'export')) {
                const stmt = src.slice(i, i + 1600);
                const m = stmt.match(/^export\s+(?:type\s+)?[^;]*?\s+from\s*['"]([^'"\n]+)['"]/s);
                if (m) specs.add(m[1]);
              } else if (startsWord(i, 'require')) {
                const call = readCallString(i + 'require'.length);
                if (call) { specs.add(call.value); i = call.end; }
              }
            }
            return specs;
          };
          const files = [];
          const walk = (d) => {
            let ents = [];
            try { ents = fs.readdirSync(d, { withFileTypes: true }); } catch (e) { return; }
            for (const e of ents) {
              if (e.name === 'node_modules' || e.name === '.git' || e.name === 'dist') continue;
              const fp = path.join(d, e.name);
              if (e.isDirectory()) walk(fp);
              else if (exts.has(path.extname(e.name))) files.push(fp);
            }
          };
          if (fs.existsSync('src')) walk('src'); else walk('.');
          const missing = new Set();
          for (const f of files) {
            let src = '';
            try { src = fs.readFileSync(f, 'utf8'); } catch (e) { continue; }
            for (const spec of collectSpecifiers(src)) {
              const name = packageNameFromSpecifier(spec);
              if (!name || builtins.has(name)) continue;
              // Heal even DECLARED packages: if a dep is listed in package.json
              // but bun install never actually wrote it to node_modules (bad
              // version, registry hiccup, externalized), Rollup still can't
              // resolve it. Only skip when it is physically present on disk.
              if (fs.existsSync(path.join('node_modules', name))) continue;
              missing.add(name);
            }
          }
          // Always guarantee the core UI deps that generated code relies on,
          // even if a hand-edited package.json or vite config dropped them.
          const CORE = ['lucide-react', 'clsx', 'tailwind-merge', 'class-variance-authority'];
          for (const c of CORE) {
            if (!fs.existsSync(path.join('node_modules', c))) missing.add(c);
          }
          const list = [...missing];
          if (!list.length) { console.log('No missing imports detected.'); process.exit(0); }
          console.log('Installing missing imports: ' + list.join(', '));
          try {
            const result = cp.spawnSync('bun', ['add', ...list], { stdio: 'inherit', shell: false });
            if (result.error) throw result.error;
            if (result.status !== 0) throw new Error('bun add exited with code ' + result.status);
          } catch (e) {
            console.error('::warning::Could not auto-install some imports: ' + e.message);
          }
          RESEOF
          node /tmp/resolve-imports.cjs 2>&1 | tee -a build.log

      - name: 🏗️ Build
        run: |
          set -eo pipefail
          {
            run_vite_only() {
              echo "↩️ Retrying with a Vite-only build (type-checking decoupled so type-only errors never block the preview/deploy)…"
              bunx --bun vite build
            }
            if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)" 2>/dev/null; then
              echo "Running package.json build script…"
              # Many build scripts chain a strict `tsc` typecheck before
              # `vite build`. A type-only error there is NOT a runtime problem
              # and must not block a preview/deploy. If the scripted build
              # fails, fall back to a Vite-only build (esbuild transpile, no
              # typecheck). Genuine import/syntax errors still fail because
              # `vite build` itself cannot bundle them.
              bun run build || run_vite_only
            else
              echo "::warning::No \"build\" script in package.json — falling back to 'bunx vite build'."
              bunx --bun vite build
            fi
          } 2>&1 | tee -a build.log

      - name: 🗜️ Zip dist
        run: |
          set -eo pipefail
          {
            if [ ! -d dist ]; then echo "::error::dist/ not found after build"; exit 1; fi
            (cd dist && zip -r "$GITHUB_WORKSPACE/dist.zip" .)
            if [ ! -f "$GITHUB_WORKSPACE/dist.zip" ]; then echo "::error::dist.zip not created"; exit 1; fi
            echo "Artifact size: $(du -h "$GITHUB_WORKSPACE/dist.zip" | cut -f1)"
          } 2>&1 | tee -a build.log

      - name: 🚀 Upload artifact to KrossBuild
        env:
          INGEST_URL: ${{ secrets.KROSS_INGEST_URL }}
          PROJECT_ID: ${{ secrets.KROSS_PROJECT_ID }}
          DEPLOY_TOKEN: ${{ secrets.KROSS_DEPLOY_TOKEN }}
          ANON_KEY: ${{ secrets.KROSS_ANON_KEY }}
        run: |
          if [ -z "$INGEST_URL" ] || [ -z "$DEPLOY_TOKEN" ]; then
            echo "::warning::KROSS_* secrets not configured — skipping deploy."
            exit 0
          fi
          echo "Uploading prebuilt artifact to KrossBuild…"
          if [ ! -f "$GITHUB_WORKSPACE/dist.zip" ]; then
            echo "::error::dist.zip not found at $GITHUB_WORKSPACE/dist.zip — cannot upload"; exit 1;
          fi
          HTTP=$(curl -sS -w "%{http_code}" -o response.json -X POST "$INGEST_URL" \
            -H "apikey: $ANON_KEY" \
            -H "x-kross-deploy-token: $DEPLOY_TOKEN" \
            -F "projectId=$PROJECT_ID" \
            -F "deploymentId=$KROSS_DEPLOYMENT_ID" \
            -F "mode=$KROSS_MODE" \
            -F "artifact=@$GITHUB_WORKSPACE/dist.zip")
          echo "Response ($HTTP):"; cat response.json; echo
          if [ "$HTTP" -ge 300 ]; then echo "::error::Deploy upload failed"; exit 1; fi
          echo "✅ Artifact uploaded; KrossBuild is deploying to Netlify."

      # If any earlier step (install/build/zip/upload) failed, tell KrossBuild so
      # the deployment row flips to `failed` immediately instead of hanging on
      # `pending` until the watchdog reaps it.
      - name: 🚨 Report build failure to KrossBuild
        if: failure()
        env:
          INGEST_URL: ${{ secrets.KROSS_INGEST_URL }}
          PROJECT_ID: ${{ secrets.KROSS_PROJECT_ID }}
          DEPLOY_TOKEN: ${{ secrets.KROSS_DEPLOY_TOKEN }}
          ANON_KEY: ${{ secrets.KROSS_ANON_KEY }}
        run: |
          if [ -z "$INGEST_URL" ] || [ -z "$DEPLOY_TOKEN" ]; then
            echo "::warning::KROSS_* secrets not configured — cannot report failure."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Ship the tail of the captured build log so KrossBuild can run
          # deterministic signature classification and (within the bounded
          # attempt cap) auto-apply a fix. jq safely JSON-escapes the log.
          LOG_TAIL="$(tail -c 12000 build.log 2>/dev/null || true)"
          jq -n \
            --arg projectId "$PROJECT_ID" \
            --arg deploymentId "$KROSS_DEPLOYMENT_ID" \
            --arg reason "GitHub Actions build failed" \
            --arg runUrl "$RUN_URL" \
            --arg logs "$LOG_TAIL" \
            '{projectId:$projectId, deploymentId:$deploymentId, reason:$reason, runUrl:$runUrl, logs:$logs}' \
            > failure.json
          curl -sS -X POST "$INGEST_URL" \
            -H "apikey: $ANON_KEY" \
            -H "x-kross-deploy-token: $DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            --data @failure.json || true
          echo "Reported build failure (with logs) to KrossBuild."
